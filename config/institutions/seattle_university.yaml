institution_id: seattle-university
legal_name: Seattle University
common_name: Seattle University
campus: Seattle
state: Washington
country: US
calendar_system: quarter

allowed_domains:
  - seattleu.edu
  - www.seattleu.edu

disallowed_campus_patterns: []

seed_urls: []

enabled_policy_families:
  - course
  - course_offering

request_policy:
  user_agent: "AcademicPlanningOS/0.1 (+{contact_email})"
  requests_per_second: 0.5
  max_concurrency: 2
  timeout_seconds: 30
  retries: 2
  exponential_backoff: true
  respect_robots_txt: true
  max_response_bytes: 10485760
